kind = "web"
previewPath = "/admin/"
title = "SAMA Control Plane"
version = "1.0.0"
id = "artifacts/eng-architect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 20876

[services.development]
run = "pnpm --filter @workspace/eng-architect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eng-architect", "run", "build" ]
publicDir = "artifacts/eng-architect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20876"
BASE_PATH = "/admin/"
