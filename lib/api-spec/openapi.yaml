        - tenantsByTier

    TenantLoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    TenantUserInfo:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
        tenantId:
          type: integer
        tenantSlug:
          type: string
        tenantName:
          type: string
      required: [id, email, name, role, tenantId, tenantSlug, tenantName]

    TenantLoginResult:
      type: object
