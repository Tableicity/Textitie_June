      type: object
      properties:
        message:
          type: string
      required: [message]

    ConversationStatus:
      type: string
      enum: [open, closed, snoozed]

    Conversation:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        departmentId:
          type: ["integer", "null"]
        contactId:
          type: ["integer", "null"]
        contactPhone:
          type: string
        contactName:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/ConversationStatus"
        dispositionId:
          type: ["integer", "null"]
        resolutionNote:
          type: ["string", "null"]
        tags:
          type: ["array", "null"]
          items:
            type: string
        assignedUserId:
          type: ["integer", "null"]
        assignedAt:
          type: ["string", "null"]
          format: date-time
        lastMessageAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        contactLocation:
          type: ["string", "null"]
      required:
        - id
        - tenantId
        - departmentId
        - contactPhone
        - contactName
        - status
        - assignedUserId
        - assignedAt
        - lastMessageAt
        - createdAt

    MessageDirection:
      type: string
      enum: [inbound, outbound, internal]

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        direction:
          $ref: "#/components/schemas/MessageDirection"
        body:
          type: string
        senderName:
          type: ["string", "null"]
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time
        status:
          type: ["string", "null"]
          description: |
            Outbound delivery state from the carrier (set on the messages row,
            updated by the Twilio status-callback webhook). One of:
            `pending` | `sent` | `delivered` | `failed`. Inbound messages
            leave this null.
        externalId:
          type: ["string", "null"]
          description: Provider-side message id (e.g. Twilio MessageSid).
        errorCode:
          type: ["string", "null"]
          description: Twilio error code when status is `failed` (e.g. `30034`).
        errorMessage:
          type: ["string", "null"]
          description: Human-readable failure reason rendered in the inbox.
        deliveredAt:
          type: ["string", "null"]
          format: date-time
          description: Timestamp the carrier confirmed delivery, if any.
      required: [id, conversationId, direction, body, senderName, read, createdAt]

