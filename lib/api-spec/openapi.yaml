openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SAMA Control Plane API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tenants
    description: Tenant management
  - name: tiers
    description: Pricing tier catalog
  - name: injection
    description: Conductor message injection
  - name: webhooks
    description: Inbound stub webhooks (Twilio / Chatwoot / n8n)
  - name: compliance
    description: 10DLC and A2P registration compliance monitoring
  - name: stats
    description: Control plane summary stats
  - name: tenant-auth
    description: Tenant user authentication
  - name: conversations
    description: Tenant messaging inbox
  - name: departments
    description: Department management
  - name: phone-numbers
    description: Phone number provisioning
  - name: agents
    description: Agent management and status
  - name: billing
    description: Subscription billing and usage
  - name: automations
    description: Automation rules management
  - name: shortcuts
    description: Message templates and shortcuts
  - name: opt-outs
    description: TCPA opt-out management
  - name: campaigns
    description: Bulk campaign messaging and analytics
  - name: analytics
    description: Tenant inbox analytics and KPI reporting
  - name: dispositions
    description: Resolution categories for closed conversations
  - name: contacts
    description: Contact records, tags, and history
  - name: reminders
    description: Per-conversation reminders for agents
  - name: migrations
    description: TextLine migration assembly line (Conductor-only)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tiers:
    get:
      operationId: listTiers
      tags: [tiers]
      summary: List pricing tiers
      responses:
        "200":
          description: List of tiers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tier"

  /tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: List tenants
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"
    post:
      operationId: createTenant
      tags: [tenants]
      summary: Create tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantInput"
      responses:
        "201":
          description: Created tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tenants/owned-numbers:
    get:
      operationId: getOwnedNumbers
      tags: [tenants]
      summary: List phone numbers owned by the platform Twilio account
      responses:
        "200":
          description: Owned numbers and whether Twilio is configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnedNumbersResponse"

  /tenants/{id}/users:
    get:
      operationId: getTenantUsers
      tags: [tenants]
      summary: List the login users (agents/owner) attached to a tenant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Users belonging to the tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantUsersResponse"

  /tenants/{id}:
    get:
      operationId: getTenant
      tags: [tenants]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateTenant
      tags: [tenants]
      summary: Patch tenant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantInput"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tenants/{id}/departments:
    get:
      operationId: getTenantDepartments
      tags: [tenants]
      summary: List a tenant's departments and their assigned numbers (Conductor)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Departments belonging to the tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantDepartmentsResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tenants/{id}/departments/{departmentId}/number:
    post:
      operationId: assignTenantDepartmentNumber
      tags: [tenants]
      summary: Assign or clear a department's phone number (Conductor)
      description: >-
        Assign an owned Twilio number to one of a tenant's departments, or clear
        it with phoneNumber=null. A number is either the account primary or one
        department's number; if the supplied number is currently this tenant's
        primary it is moved off primary in the same step.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: departmentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignDepartmentNumberInput"
      responses:
        "200":
          description: Updated department and the tenant's resulting primary number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignDepartmentNumberResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Tenant or department not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Number already assigned elsewhere
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /inject:
    post:
      operationId: injectMessage
      tags: [injection]
      summary: Inject a message into the SAMA pipe
      description: |
        Conductor-authorized message injection. Forwards to the configured n8n
        webhook (or stubs the call if N8N_WEBHOOK_URL is not set), records an
        injection log entry, and returns the resulting log row.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InjectMessageInput"
      responses:
        "201":
          description: Injection accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InjectionLog"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /injections:
    get:
      operationId: listInjections
      tags: [injection]
      summary: List recent injection log entries
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Injection log entries (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InjectionLog"

  /webhooks/{source}:
    post:
      operationId: receiveWebhook
      tags: [webhooks]
      summary: Receive an inbound webhook (stub)
      description: |
        Stubbed inbound webhook receiver for Twilio, Chatwoot, or n8n. Records
        the raw payload to the webhook event log and acknowledges. No carrier
        calls are made until the Conductor wires live credentials.
      parameters:
        - name: source
          in: path
          required: true
          schema:
            type: string
            enum: [twilio, chatwoot, n8n]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "201":
          description: Webhook recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEvent"

  /webhook-events:
    get:
      operationId: listWebhookEvents
      tags: [webhooks]
      summary: List recent inbound webhook events
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Webhook events (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookEvent"

  /compliance:
    get:
      operationId: getCompliance
      tags: [compliance]
      summary: 10DLC compliance monitor
      description: |
        Queries Twilio Trust Hub and A2P Brand Registration APIs for real-time
        compliance status. Returns brand registration, trust hub bundle, and
        customer profile statuses alongside per-tenant number inventory.
      responses:
        "200":
          description: Compliance report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceReport"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Control plane summary
      responses:
        "200":
          description: Aggregated control plane stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControlPlaneStats"

  /tenant-auth/login:
    post:
      operationId: tenantLogin
      tags: [tenant-auth]
      summary: Tenant user login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantLoginResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tenant-auth/me:
    get:
      operationId: tenantMe
      tags: [tenant-auth]
      summary: Get current tenant user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantMeResult"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tenant-auth/change-password:
    post:
      operationId: changeTenantPassword
      tags: [tenant-auth]
      summary: Change the signed-in tenant user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantChangePasswordInput"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantChangePasswordResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated or current password incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tenant-settings/me:
    get:
      operationId: getTenantSettings
      tags: [tenant-settings]
      summary: Get the signed-in tenant's organization settings
      responses:
        "200":
          description: Tenant settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantSettings"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateTenantSettings
      tags: [tenant-settings]
      summary: Update the signed-in tenant's organization settings (admin/owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantSettingsInput"
      responses:
        "200":
          description: Updated tenant settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantSettings"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Admin or owner role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /conversations:
    post:
      operationId: createConversation
      tags: [conversations]
      summary: Start a new conversation by phone number (upserts contact, reuses open conversation if one exists)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationInput"
      responses:
        "200":
          description: Existing open conversation reused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List conversations for the tenant
      parameters:
        - name: departmentId
          in: query
          required: false
          schema:
            type: integer
          description: Filter by department ID. Pass 0 for unassigned conversations.
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search by contact name, phone, or message body
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, closed]
        - name: assignedUserId
          in: query
          required: false
          schema:
            type: integer
          description: Filter by assigned agent. Pass 0 for unassigned.
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get a single conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateConversation
      tags: [conversations]
      summary: Update conversation status, disposition, or resolution note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConversationInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [conversations]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages in the conversation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: sendMessage
      tags: [conversations]
      summary: Send a message in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /conversations/{id}/claim:
    post:
      operationId: claimConversation
      tags: [conversations]
      summary: Claim an unassigned conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimResult"
        "409":
          description: Already assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /conversations/{id}/transfer:
    post:
      operationId: transferConversation
      tags: [conversations]
      summary: Transfer conversation to another agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferInput"
      responses:
        "200":
          description: Conversation transferred
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimResult"

  /conversations/{id}/unassign:
    post:
      operationId: unassignConversation
      tags: [conversations]
      summary: Release conversation back to pool
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation unassigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /conversations/{id}/auto-route:
    post:
      operationId: autoRouteConversation
      tags: [conversations]
      summary: Auto-route conversation to an agent based on department strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation routed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoRouteResult"
        "422":
          description: No agents available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /conversations/{id}/events:
    get:
      operationId: listConversationEvents
      tags: [conversations]
      summary: Get conversation audit trail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of conversation events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationEventItem"

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all agents for the tenant
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentItem"

  /agents/invite:
    post:
      operationId: inviteAgent
      tags: [agents]
      summary: Invite a new agent to the tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteAgentInput"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentBasicItem"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /agents/{id}:
    patch:
      operationId: updateAgent
      tags: [agents]
      summary: Update agent profile (role, skills, languages)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentInput"
      responses:
        "200":
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentItem"
    delete:
      operationId: deleteAgent
      tags: [agents]
      summary: Delete an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /agents/status:
    post:
      operationId: setAgentStatus
      tags: [agents]
      summary: Set own online/offline/away status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetAgentStatusInput"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStatusResult"

  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List departments for the current tenant
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepartmentItem"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create a new department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentInput"
      responses:
        "201":
          description: Department created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentItem"

  /departments/{id}:
    get:
      operationId: getDepartment
      tags: [departments]
      summary: Get a department by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Department details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateDepartment
      tags: [departments]
      summary: Update a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDepartmentInput"
      responses:
        "200":
          description: Department updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteDepartment
