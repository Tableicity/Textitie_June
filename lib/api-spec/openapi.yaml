            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tenants/{tenantId}/migrations/{jobId}/hydrate:
    post:
      operationId: hydrateMigration
      tags: [migrations]
      summary: Promote a verified migration's data into quarantined live tables (Conductor-only)
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hydration queued (job moves to hydrating)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationJob"
        "400":
          description: Job is not in a hydratable state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Migration job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tenants/{tenantId}/migrations/{jobId}/flip-live:
    post:
      operationId: activateMigration
      tags: [migrations]
      summary: Flip a hydrated migration live, clearing quarantine on its rows (Conductor-only)
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Migration flipped live
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationJob"
        "400":
          description: Job is not in a flippable state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: One or more imported phones already have live contacts that could not be auto-merged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Migration job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tenants/{tenantId}/migrations/{jobId}/discard:
    post:
      operationId: discardMigration
      tags: [migrations]
      summary: Discard a migration and delete its quarantined rows + staged data (Conductor-only)
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Migration discarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationJob"
        "409":
          description: Job is not in a discardable state (in flight, or already flipped live)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Migration job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ApiError:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Region:
      type: string
      enum: [DE, EE, US]
      description: Sovereign data residency region

    TierCode:
      type: string
      enum: [starter, growth, enterprise]

    Tier:
      type: object
      properties:
        id:
          type: integer
        code:
          $ref: "#/components/schemas/TierCode"
        name:
          type: string
        description:
          type: string
        features:
          type: array
          items:
            type: string
      required: [id, code, name, description, features]

    Tenant:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
          description: Tenant slug, e.g. "acme" → acme.sama.io
        name:
          type: string
        region:
          $ref: "#/components/schemas/Region"
        tierCode:
          $ref: "#/components/schemas/TierCode"
        sovereignToggle:
          type: boolean
          description: Enterprise-only DE residency lock
        phoneNumber:
          type: ["string", "null"]
          description: E.164 number this tenant owns (used as outbound From and inbound routing key)
        chatwootAccountId:
          type: ["integer", "null"]
        chatwootInboxId:
          type: ["integer", "null"]
        knowledgeBase:
          type: ["string", "null"]
          description: Free-text knowledge base used by the AI Student to draft Whispers
        brandScope:
          type: ["string", "null"]
          description: >-
            Conductor-set short brand/vertical blurb the inbound triage router
            uses to decide whether an inbound SMS is in-scope (e.g. "B2B HVAC
            parts supplier; answer product/ordering/support questions only").
            null = router fails open to the Classroom/Professor draft path.
        fallbackPhrase:
          type: ["string", "null"]
          description: >-
            Conductor-set Co-Pilot holding-phrase draft. When an inbound is
            tenant-specific but ungrounded (no Classroom/KB match), the pipeline
            drafts this verbatim instead of letting the Student/Professor guess.
            null/empty = existing Student/Professor draft path.
        autopilotHoldingPhrase:
          type: ["string", "null"]
          description: >-
            Conductor-set Auto-Pilot "graceful handback" holding phrase. When
            Auto-Pilot refuses to auto-send (fail-closed gate) or its AI draft
            fails, the pipeline auto-sends THIS verbatim as a content-free
            acknowledgment and KEEPS the Blue handback for a human. Sent verbatim
            (unlike fallbackPhrase, which is a Co-Pilot draft a human edits).
            null/empty = today's silent handback (fail-safe).
        unregisteredSurchargeEnabled:
          type: boolean
          description: >-
            When false, the per-number unregistered carrier surcharge is waived
            for this tenant (carrier fee still applies).
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - slug
        - name
        - region
        - tierCode
        - sovereignToggle
        - phoneNumber
        - chatwootAccountId
        - chatwootInboxId
        - knowledgeBase
        - brandScope
        - fallbackPhrase
        - autopilotHoldingPhrase
        - unregisteredSurchargeEnabled
        - createdAt

    CreateTenantInput:
      type: object
      properties:
        slug:
          type: string
          minLength: 2
          maxLength: 64
        name:
          type: string
          minLength: 1
          maxLength: 128
        region:
          $ref: "#/components/schemas/Region"
        tierCode:
          $ref: "#/components/schemas/TierCode"
        sovereignToggle:
          type: boolean
          default: false
        phoneNumber:
          type: ["string", "null"]
        chatwootAccountId:
          type: ["integer", "null"]
        chatwootInboxId:
          type: ["integer", "null"]
        knowledgeBase:
          type: ["string", "null"]
      required: [slug, name, region, tierCode]

    UpdateTenantInput:
      type: object
      description: Partial tenant update — only supplied fields are written.
      properties:
        name:
          type: string
        region:
          $ref: "#/components/schemas/Region"
        tierCode:
          $ref: "#/components/schemas/TierCode"
        sovereignToggle:
          type: boolean
        phoneNumber:
          type: ["string", "null"]
        chatwootAccountId:
          type: ["integer", "null"]
        chatwootInboxId:
          type: ["integer", "null"]
        knowledgeBase:
          type: ["string", "null"]
        brandScope:
          type: ["string", "null"]
          description: >-
            Conductor-set short brand/vertical blurb for the inbound triage
            router. null/empty = router fails open to the existing path.
        fallbackPhrase:
          type: ["string", "null"]
          description: >-
            Conductor-set Co-Pilot holding phrase for ungrounded tenant-specific
            inbounds. null/empty = existing Student/Professor draft path.
        autopilotHoldingPhrase:
          type: ["string", "null"]
          description: >-
            Conductor-set Auto-Pilot graceful-handback holding phrase, auto-sent
            verbatim when Auto-Pilot refuses or its draft fails. null/empty =
            today's silent handback.
        unregisteredSurchargeEnabled:
          type: boolean
          description: >-
            When false, the per-number unregistered carrier surcharge is waived
            for this tenant (carrier fee still applies).

    InjectMessageInput:
      type: object
      properties:
        tenantId:
          type: ["integer", "null"]
          description: Optional tenant scope for the injection
        to:
          type: string
          description: Destination phone number (E.164)
          minLength: 3
        body:
          type: string
          description: Message body
          minLength: 1
        conductorAuthorized:
          type: boolean
          default: true
      required: [to, body]

    InjectionStatus:
      type: string
      enum: [stubbed, sent, failed]

    InjectionLog:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: ["integer", "null"]
        toNumber:
          type: string
        body:
          type: string
        status:
          $ref: "#/components/schemas/InjectionStatus"
        responseSummary:
          type: ["string", "null"]
        conductorAuthorized:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - tenantId
        - toNumber
        - body
        - status
        - responseSummary
        - conductorAuthorized
        - createdAt

    WebhookPayload:
      type: object
