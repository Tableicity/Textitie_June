          $ref: "#/components/schemas/ComplianceItem"
        trustHubBundle:
          $ref: "#/components/schemas/ComplianceItem"
        customerProfile:
          $ref: "#/components/schemas/ComplianceItem"
        tenantNumbers:
          type: array
