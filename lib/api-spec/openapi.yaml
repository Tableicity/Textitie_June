              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reminder"
    post:
      operationId: createReminder
      tags: [reminders]
      summary: Create a reminder on a conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReminderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reminder"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /reminders/{id}/dismiss:
    patch:
      operationId: dismissReminder
      tags: [reminders]
      summary: Dismiss a reminder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reminder"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /reminders/{id}:
    delete:
      operationId: deleteReminder
      tags: [reminders]
      summary: Delete a reminder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ApiError:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Region:
      type: string
      enum: [DE, EE, US]
      description: Sovereign data residency region

    TierCode:
      type: string
      enum: [starter, growth, enterprise]

    Tier:
      type: object
      properties:
        id:
          type: integer
        code:
          $ref: "#/components/schemas/TierCode"
        name:
          type: string
        description:
          type: string
        features:
          type: array
          items:
            type: string
      required: [id, code, name, description, features]

    Tenant:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
          description: Tenant slug, e.g. "acme" → acme.sama.io
        name:
          type: string
        region:
          $ref: "#/components/schemas/Region"
        tierCode:
          $ref: "#/components/schemas/TierCode"
        sovereignToggle:
          type: boolean
          description: Enterprise-only DE residency lock
        phoneNumber:
          type: ["string", "null"]
          description: E.164 number this tenant owns (used as outbound From and inbound routing key)
        chatwootAccountId:
          type: ["integer", "null"]
        chatwootInboxId:
          type: ["integer", "null"]
        knowledgeBase:
          type: ["string", "null"]
          description: Free-text knowledge base used by the AI Student to draft Whispers
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - slug
        - name
        - region
        - tierCode
        - sovereignToggle
        - phoneNumber
        - chatwootAccountId
        - chatwootInboxId
        - knowledgeBase
        - createdAt

    CreateTenantInput:
      type: object
      properties:
        slug:
          type: string
          minLength: 2
          maxLength: 64
        name:
          type: string
          minLength: 1
          maxLength: 128
        region:
          $ref: "#/components/schemas/Region"
        tierCode:
          $ref: "#/components/schemas/TierCode"
        sovereignToggle:
          type: boolean
          default: false
        phoneNumber:
          type: ["string", "null"]
        chatwootAccountId:
          type: ["integer", "null"]
        chatwootInboxId:
          type: ["integer", "null"]
        knowledgeBase:
          type: ["string", "null"]
      required: [slug, name, region, tierCode]

    UpdateTenantInput:
      type: object
      description: Partial tenant update — only supplied fields are written.
      properties:
        name:
          type: string
        region:
          $ref: "#/components/schemas/Region"
        tierCode:
          $ref: "#/components/schemas/TierCode"
        sovereignToggle:
          type: boolean
        phoneNumber:
          type: ["string", "null"]
        chatwootAccountId:
          type: ["integer", "null"]
        chatwootInboxId:
          type: ["integer", "null"]
        knowledgeBase:
          type: ["string", "null"]

    InjectMessageInput:
      type: object
      properties:
        tenantId:
          type: ["integer", "null"]
          description: Optional tenant scope for the injection
        to:
          type: string
          description: Destination phone number (E.164)
          minLength: 3
        body:
          type: string
          description: Message body
          minLength: 1
        conductorAuthorized:
          type: boolean
          default: true
      required: [to, body]

    InjectionStatus:
      type: string
      enum: [stubbed, sent, failed]

    InjectionLog:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: ["integer", "null"]
        toNumber:
          type: string
        body:
          type: string
        status:
          $ref: "#/components/schemas/InjectionStatus"
        responseSummary:
          type: ["string", "null"]
        conductorAuthorized:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - tenantId
        - toNumber
        - body
        - status
        - responseSummary
        - conductorAuthorized
        - createdAt

    WebhookPayload:
      type: object
      additionalProperties: true

    WebhookSource:
      type: string
      enum: [twilio, chatwoot, n8n]

    WebhookEvent:
      type: object
      properties:
        id:
          type: integer
        source:
          $ref: "#/components/schemas/WebhookSource"
        payload:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
      required: [id, source, payload, createdAt]

    ComplianceItem:
      type: object
      properties:
        sid:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        friendlyName:
          type: ["string", "null"]
        detail:
          type: ["string", "null"]
      required: [sid, status, friendlyName, detail]

    TenantNumberStatus:
      type: object
