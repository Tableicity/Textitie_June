openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SAMA Control Plane API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tenants
    description: Tenant management
  - name: tiers
    description: Pricing tier catalog
  - name: injection
    description: Conductor message injection
  - name: webhooks
    description: Inbound stub webhooks (Twilio / Chatwoot / n8n)
  - name: compliance
    description: 10DLC and A2P registration compliance monitoring
  - name: stats
    description: Control plane summary stats
  - name: tenant-auth
    description: Tenant user authentication
  - name: conversations
    description: Tenant messaging inbox
  - name: departments
    description: Department management
  - name: phone-numbers
    description: Phone number provisioning
  - name: agents
    description: Agent management and status
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tiers:
    get:
      operationId: listTiers
      tags: [tiers]
      summary: List pricing tiers
      responses:
        "200":
          description: List of tiers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tier"

  /tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: List tenants
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"
    post:
      operationId: createTenant
      tags: [tenants]
      summary: Create tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantInput"
      responses:
        "201":
          description: Created tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tenants/{id}:
    get:
      operationId: getTenant
      tags: [tenants]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateTenant
      tags: [tenants]
      summary: Patch tenant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantInput"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /inject:
    post:
      operationId: injectMessage
      tags: [injection]
      summary: Inject a message into the SAMA pipe
      description: |
        Conductor-authorized message injection. Forwards to the configured n8n
        webhook (or stubs the call if N8N_WEBHOOK_URL is not set), records an
        injection log entry, and returns the resulting log row.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InjectMessageInput"
      responses:
        "201":
          description: Injection accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InjectionLog"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /injections:
    get:
      operationId: listInjections
      tags: [injection]
      summary: List recent injection log entries
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Injection log entries (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InjectionLog"

  /webhooks/{source}:
    post:
      operationId: receiveWebhook
      tags: [webhooks]
      summary: Receive an inbound webhook (stub)
      description: |
        Stubbed inbound webhook receiver for Twilio, Chatwoot, or n8n. Records
        the raw payload to the webhook event log and acknowledges. No carrier
        calls are made until the Conductor wires live credentials.
      parameters:
        - name: source
          in: path
          required: true
          schema:
            type: string
            enum: [twilio, chatwoot, n8n]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "201":
          description: Webhook recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEvent"

  /webhook-events:
    get:
      operationId: listWebhookEvents
      tags: [webhooks]
      summary: List recent inbound webhook events
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Webhook events (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookEvent"

  /compliance:
    get:
      operationId: getCompliance
      tags: [compliance]
      summary: 10DLC compliance monitor
      description: |
        Queries Twilio Trust Hub and A2P Brand Registration APIs for real-time
        compliance status. Returns brand registration, trust hub bundle, and
        customer profile statuses alongside per-tenant number inventory.
      responses:
        "200":
          description: Compliance report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceReport"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Control plane summary
      responses:
        "200":
          description: Aggregated control plane stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControlPlaneStats"

  /tenant-auth/login:
    post:
      operationId: tenantLogin
      tags: [tenant-auth]
      summary: Tenant user login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantLoginResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tenant-auth/me:
    get:
      operationId: tenantMe
      tags: [tenant-auth]
      summary: Get current tenant user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantMeResult"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List conversations for the tenant
      parameters:
        - name: departmentId
          in: query
          required: false
          schema:
            type: integer
          description: Filter by department ID. Pass 0 for unassigned conversations.
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get a single conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [conversations]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages in the conversation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: sendMessage
      tags: [conversations]
      summary: Send a message in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /conversations/{id}/claim:
    post:
      operationId: claimConversation
      tags: [conversations]
      summary: Claim an unassigned conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimResult"
        "409":
          description: Already assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /conversations/{id}/transfer:
    post:
      operationId: transferConversation
      tags: [conversations]
      summary: Transfer conversation to another agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferInput"
      responses:
        "200":
          description: Conversation transferred
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimResult"

  /conversations/{id}/unassign:
    post:
      operationId: unassignConversation
      tags: [conversations]
      summary: Release conversation back to pool
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation unassigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /conversations/{id}/auto-route:
    post:
      operationId: autoRouteConversation
      tags: [conversations]
      summary: Auto-route conversation to an agent based on department strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation routed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoRouteResult"
        "422":
          description: No agents available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /conversations/{id}/events:
    get:
      operationId: listConversationEvents
      tags: [conversations]
      summary: Get conversation audit trail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of conversation events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationEventItem"

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all agents for the tenant
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentItem"

  /agents/invite:
    post:
      operationId: inviteAgent
      tags: [agents]
      summary: Invite a new agent to the tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteAgentInput"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentBasicItem"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /agents/{id}:
    patch:
      operationId: updateAgent
      tags: [agents]
      summary: Update agent profile (role, skills, languages)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentInput"
      responses:
        "200":
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentItem"
    delete:
      operationId: deleteAgent
      tags: [agents]
      summary: Delete an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /agents/status:
    post:
      operationId: setAgentStatus
      tags: [agents]
      summary: Set own online/offline/away status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetAgentStatusInput"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStatusResult"

  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List departments for the current tenant
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepartmentItem"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create a new department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentInput"
      responses:
        "201":
          description: Department created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentItem"

  /departments/{id}:
    get:
      operationId: getDepartment
      tags: [departments]
      summary: Get a department by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Department details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateDepartment
      tags: [departments]
      summary: Update a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDepartmentInput"
      responses:
        "200":
          description: Department updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteDepartment
      tags: [departments]
      summary: Delete a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /departments/{id}/members:
    get:
      operationId: listDepartmentMembers
      tags: [departments]
      summary: List members of a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepartmentMemberItem"
    post:
      operationId: addDepartmentMember
      tags: [departments]
      summary: Add a member to a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddDepartmentMemberInput"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentMemberRecord"

  /departments/{id}/members/{userId}:
    delete:
      operationId: removeDepartmentMember
      tags: [departments]
      summary: Remove a member from a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /phone-numbers/available:
    get:
      operationId: searchAvailableNumbers
      tags: [phone-numbers]
      summary: Search available phone numbers from Twilio
      parameters:
        - name: country
          in: query
          schema:
            type: string
            default: US
        - name: areaCode
          in: query
          schema:
            type: string
        - name: contains
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Available numbers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailableNumberItem"

  /phone-numbers/purchase:
    post:
      operationId: purchasePhoneNumber
      tags: [phone-numbers]
      summary: Purchase a phone number from Twilio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseNumberInput"
      responses:
        "201":
          description: Number purchased
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchasedNumberResult"

  /phone-numbers:
    get:
      operationId: listPhoneNumbers
      tags: [phone-numbers]
      summary: List phone numbers assigned to tenant departments
      responses:
        "200":
          description: Phone numbers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TenantPhoneNumberItem"

  /phone-numbers/assign:
    post:
      operationId: assignPhoneNumber
      tags: [phone-numbers]
      summary: Assign a phone number to a department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignNumberInput"
      responses:
        "200":
          description: Number assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ApiError:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Region:
      type: string
      enum: [DE, EE, US]
      description: Sovereign data residency region

    TierCode:
      type: string
      enum: [starter, growth, enterprise]

    Tier:
      type: object
      properties:
        id:
          type: integer
        code:
          $ref: "#/components/schemas/TierCode"
        name:
          type: string
        description:
          type: string
        features:
          type: array
          items:
            type: string
      required: [id, code, name, description, features]

    Tenant:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
          description: Tenant slug, e.g. "acme" → acme.sama.io
        name:
          type: string
        region:
          $ref: "#/components/schemas/Region"
        tierCode:
          $ref: "#/components/schemas/TierCode"
        sovereignToggle:
          type: boolean
          description: Enterprise-only DE residency lock
        phoneNumber:
          type: ["string", "null"]
          description: E.164 number this tenant owns (used as outbound From and inbound routing key)
        chatwootAccountId:
          type: ["integer", "null"]
        chatwootInboxId:
          type: ["integer", "null"]
        knowledgeBase:
          type: ["string", "null"]
          description: Free-text knowledge base used by the AI Student to draft Whispers
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - slug
        - name
        - region
        - tierCode
        - sovereignToggle
        - phoneNumber
        - chatwootAccountId
        - chatwootInboxId
        - knowledgeBase
        - createdAt

    CreateTenantInput:
      type: object
      properties:
        slug:
          type: string
          minLength: 2
          maxLength: 64
        name:
          type: string
          minLength: 1
          maxLength: 128
        region:
          $ref: "#/components/schemas/Region"
        tierCode:
          $ref: "#/components/schemas/TierCode"
        sovereignToggle:
          type: boolean
          default: false
        phoneNumber:
          type: ["string", "null"]
        chatwootAccountId:
          type: ["integer", "null"]
        chatwootInboxId:
          type: ["integer", "null"]
        knowledgeBase:
          type: ["string", "null"]
      required: [slug, name, region, tierCode]

    UpdateTenantInput:
      type: object
      description: Partial tenant update — only supplied fields are written.
      properties:
        name:
          type: string
        region:
          $ref: "#/components/schemas/Region"
        tierCode:
          $ref: "#/components/schemas/TierCode"
        sovereignToggle:
          type: boolean
        phoneNumber:
          type: ["string", "null"]
        chatwootAccountId:
          type: ["integer", "null"]
        chatwootInboxId:
          type: ["integer", "null"]
        knowledgeBase:
          type: ["string", "null"]

    InjectMessageInput:
      type: object
      properties:
        tenantId:
          type: ["integer", "null"]
          description: Optional tenant scope for the injection
        to:
          type: string
          description: Destination phone number (E.164)
          minLength: 3
        body:
          type: string
          description: Message body
          minLength: 1
        conductorAuthorized:
          type: boolean
          default: true
      required: [to, body]

    InjectionStatus:
      type: string
      enum: [stubbed, sent, failed]

    InjectionLog:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: ["integer", "null"]
        toNumber:
          type: string
        body:
          type: string
        status:
          $ref: "#/components/schemas/InjectionStatus"
        responseSummary:
          type: ["string", "null"]
        conductorAuthorized:
          type: boolean
        createdAt:
          type: string
