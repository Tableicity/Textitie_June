        id:
          type: integer
        source:
          $ref: "#/components/schemas/WebhookSource"
        payload:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
      required: [id, source, payload, createdAt]

    ComplianceItem:
      type: object
      properties:
        sid:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        friendlyName:
          type: ["string", "null"]
        detail:
          type: ["string", "null"]
      required: [sid, status, friendlyName, detail]

    TenantNumberStatus:
      type: object
      properties:
        tenantSlug:
          type: string
        tenantName:
          type: string
        phoneNumber:
          type: ["string", "null"]
        region:
          type: string
      required: [tenantSlug, tenantName, phoneNumber, region]

    ComplianceReport:
      type: object
      properties:
        brandRegistration:
          $ref: "#/components/schemas/ComplianceItem"
        trustHubBundle:
          $ref: "#/components/schemas/ComplianceItem"
        customerProfile:
          $ref: "#/components/schemas/ComplianceItem"
        tenantNumbers:
          type: array
          items:
            $ref: "#/components/schemas/TenantNumberStatus"
      required: [brandRegistration, trustHubBundle, customerProfile, tenantNumbers]

    ControlPlaneStats:
      type: object
      properties:
        tenantCount:
          type: integer
        injectionCount:
          type: integer
        webhookEventCount:
          type: integer
        injectionsLast24h:
          type: integer
        tenantsByRegion:
          type: array
          items:
            type: object
            properties:
              region:
                $ref: "#/components/schemas/Region"
              count:
                type: integer
            required: [region, count]
        tenantsByTier:
          type: array
          items:
            type: object
            properties:
              tierCode:
                $ref: "#/components/schemas/TierCode"
              count:
                type: integer
            required: [tierCode, count]
      required:
        - tenantCount
        - injectionCount
        - webhookEventCount
        - injectionsLast24h
        - tenantsByRegion
        - tenantsByTier

    TenantLoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    TenantUserInfo:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
        tenantId:
          type: integer
        tenantSlug:
          type: string
        tenantName:
          type: string
      required: [id, email, name, role, tenantId, tenantSlug, tenantName]

    TenantLoginResult:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/TenantUserInfo"
      required: [token, user]

    TenantMeResult:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/TenantUserInfo"
      required: [user]

    TenantChangePasswordInput:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
      required: [currentPassword, newPassword]

    TenantChangePasswordResult:
      type: object
      properties:
        message:
          type: string
      required: [message]

    TenantSettings:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        region:
          type: string
        phoneNumber:
          type: ["string", "null"]
          description: E.164 outbound number this tenant owns
        tierCode:
          type: string
        quietHoursStart:
          type: ["integer", "null"]
        quietHoursEnd:
          type: ["integer", "null"]
        quietHoursTz:
          type: string
        frequencyCapPerDay:
          type: integer
        requireDoubleOptIn:
          type: boolean
        hipaaEnabled:
          type: boolean
        baaAcknowledgedAt:
          type: ["string", "null"]
          format: date-time
        baaAcknowledgedBy:
          type: ["integer", "null"]
        hipaaEligible:
          type: ["boolean", "null"]
        engagementMode:
          type: string
          enum: [manual, copilot, autopilot]
          description: >-
            How the AI engages on inbound texts. "manual" = AI off (no draft,
            no auto-send, no learning). "copilot" drafts a reply into the
            composer for a human to edit and send (never learns). "autopilot"
            may auto-send the reply verbatim when it is high-confidence,
            classroom-grounded, conflict-free, in a safe category, and passes
            outbound compliance — and only then persists what it learned.
            Legacy values "assisted"/"gated_auto" are still accepted on write
            and normalized to copilot/autopilot.
      required:
        - id
        - name
        - slug
        - region
        - tierCode
        - engagementMode

    UpdateTenantSettingsInput:
      type: object
      description: Partial tenant settings update — only supplied fields are written. Requires admin or owner role.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
        quietHoursStart:
          type: ["integer", "null"]
          minimum: 0
          maximum: 23
        quietHoursEnd:
          type: ["integer", "null"]
          minimum: 0
          maximum: 23
        quietHoursTz:
          type: string
        frequencyCapPerDay:
          type: integer
          minimum: 0
          maximum: 1000
        requireDoubleOptIn:
          type: boolean
        engagementMode:
          type: string
          enum: [manual, copilot, autopilot]
          description: >-
            AI engagement mode — "manual" (AI off), "copilot" (draft only,
            never learns) or "autopilot" (may auto-send safe answers and learn).
            Legacy "assisted"/"gated_auto" are accepted and normalized.

    ConversationStatus:
      type: string
      enum: [open, closed, snoozed]

    Conversation:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        departmentId:
          type: ["integer", "null"]
        contactId:
          type: ["integer", "null"]
        contactPhone:
          type: string
        contactName:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/ConversationStatus"
        dispositionId:
          type: ["integer", "null"]
        resolutionNote:
          type: ["string", "null"]
        tags:
          type: ["array", "null"]
          items:
            type: string
        assignedUserId:
          type: ["integer", "null"]
        assignedAt:
          type: ["string", "null"]
          format: date-time
        lastMessageAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        contactLocation:
          type: ["string", "null"]
        engagementModeOverride:
          type: ["string", "null"]
          enum: [manual, copilot, autopilot, null]
          description: >-
            Per-conversation engagement mode that overrides the tenant default.
            null = inherit the tenant's engagementMode.
        effectiveEngagementMode:
          type: string
          enum: [manual, copilot, autopilot]
          description: Resolved mode = engagementModeOverride ?? tenant.engagementMode.
        aiState:
          type: ["object", "null"]
          description: >-
            Latest AI reply state for this conversation (one row per
            conversation); null if the AI has not produced a state yet.
          properties:
            status:
              type: string
              enum: [idle, drafted, auto_sent, failed, refused, human_handled, superseded]
              description: >-
                Lifecycle of the latest AI reply. "drafted" = Co-Pilot draft
                waiting in the composer. "auto_sent" = Auto-Pilot sent it.
                "failed" = Grok/send error (Blue handback). "refused" = safety
                gate blocked it (Blue handback). "human_handled" = a human took
                the wheel for this reply. "superseded" = a newer inbound
                replaced it.
            draftBody:
              type: ["string", "null"]
              description: Suggested reply text to pre-fill the composer (Co-Pilot).
            draftSource:
              type: ["string", "null"]
              enum: [student, professor, student_flash, router_decline, fallback_phrase, null]
              description: >-
                Origin of the draft. "student" = grounded Classroom draft;
                "professor" = escalation draft; "student_flash" = Grok general
                knowledge (NOT Classroom-grounded); "router_decline" =
                off-scope decline; "fallback_phrase" = Conductor-set holding
                phrase for an ungrounded tenant-specific inbound. The latter
                three are Co-Pilot-only.
            confidence:
              type: ["string", "null"]
            queryCategory:
              type: ["string", "null"]
            reasonCode:
              type: ["string", "null"]
              description: Machine code for a Blue handback (e.g. grok_error, gate_refused).
            reasonText:
              type: ["string", "null"]
              description: Human-readable chip text near the composer on a Blue handback.
            latestInboundMessageId:
              type: ["integer", "null"]
            outboundMessageId:
              type: ["integer", "null"]
            autoSentAt:
              type: ["string", "null"]
              format: date-time
            updatedAt:
              type: string
              format: date-time
          required:
            - status
            - draftBody
            - draftSource
            - reasonCode
            - reasonText
            - updatedAt
      required:
        - id
        - tenantId
        - departmentId
        - contactPhone
        - contactName
        - status
        - assignedUserId
        - assignedAt
        - lastMessageAt
        - createdAt
        - engagementModeOverride
        - effectiveEngagementMode
        - aiState

    MessageDirection:
      type: string
      enum: [inbound, outbound, internal]

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        direction:
          $ref: "#/components/schemas/MessageDirection"
        body:
          type: string
        senderName:
          type: ["string", "null"]
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time
        status:
          type: ["string", "null"]
          description: |
            Outbound delivery state from the carrier (set on the messages row,
            updated by the Twilio status-callback webhook). One of:
            `pending` | `sent` | `delivered` | `failed`. Inbound messages
            leave this null.
        externalId:
          type: ["string", "null"]
          description: Provider-side message id (e.g. Twilio MessageSid).
        errorCode:
          type: ["string", "null"]
          description: Twilio error code when status is `failed` (e.g. `30034`).
        errorMessage:
          type: ["string", "null"]
          description: Human-readable failure reason rendered in the inbox.
        deliveredAt:
          type: ["string", "null"]
          format: date-time
          description: Timestamp the carrier confirmed delivery, if any.
      required: [id, conversationId, direction, body, senderName, read, createdAt]

    SendMessageInput:
